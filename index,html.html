<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #1e1e1e;
        font-family: Arial, sans-serif;
    }

    .calculator {
        background: #2c2c2c;
        padding: 18px;
        border-radius: 14px;
        width: min(100%, 360px);
        max-width: 420px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
    }

    #display {
        width: 100%;
        min-height: 64px;
        font-size: 26px;
        margin-bottom: 12px;
        text-align: right;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #111;
        color: #fff;
        outline: none;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
    }

    button {
        min-height: 56px;
        padding: 12px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #444;
        color: #fff;
        transition: transform 0.12s ease, background-color 0.12s ease;
    }

    button:hover,
    button:focus {
        background: #666;
        transform: translateY(-0.5px);
    }

    button:active {
        transform: translateY(1px);
    }

    .operator {
        background: #ff9500;
    }

    .equal {
        background: #28a745;
        grid-column: span 2;
    }

    .clear {
        background: #dc3545;
    }

    @media (max-width: 480px) {
        #display {
            font-size: 22px;
            min-height: 56px;
        }

        button {
            min-height: 50px;
            font-size: 14px;
        }

        .calculator {
            padding: 14px;
        }
    }

    .calculator {
        background: #2c2c2c;
        padding: 20px;
        border-radius: 10px;
        width: 320px;
    }

    #display {
        width: 100%;
        height: 60px;
        font-size: 24px;
        margin-bottom: 10px;
        text-align: right;
        padding: 10px;
        border: none;
        border-radius: 5px;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
    }

    button {
        padding: 15px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #444;
        color: white;
    }

    button:hover {
        background: #666;
    }

    .operator {
        background: #ff9500;
    }

    .equal {
        background: #28a745;
        grid-column: span 2;
    }

    .clear {
        background: #dc3545;
    }
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="backspace()" class="clear">←</button>
        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>
        <button onclick="append('%')">%</button>
        <button onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')">×</button>
        <button onclick="append('Math.sqrt(')">√</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')">−</button>
        <button onclick="append('Math.pow(')">xʸ</button>
        <button onclick="insertFact()">n!</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')">+</button>
        <button onclick="append('Math.log(')">log</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="append('Math.sin(')">sin</button>
        <button onclick="append('Math.cos(')">cos</button>
        <button onclick="append('Math.tan(')">tan</button>

        <button onclick="append('Math.PI')">π</button>
        <button onclick="append('Math.E')">e</button>
        <button onclick="calculate()" class="equal">=</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function append(value) {
        if (display.value === "Error") display.value = "";
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
    }

    function formatExpression(expr) {
        return expr
            .replace(/×/g, "*")
            .replace(/÷/g, "/")
            .replace(/\bπ\b/g, "Math.PI")
            .replace(/\be\b/g, "Math.E")
            .replace(/%/g, "/100");
    }

    function calculate() {
        const raw = display.value;
        if (!raw) return;

        try {
            const expression = formatExpression(raw);
            // eslint-disable-next-line no-new-func
            const result = Function("Math", `return ${expression}`)(Math);
            display.value = (typeof result === 'number' && !Number.isFinite(result)) ? 'Error' : String(result);
        } catch (err) {
            console.error(err);
            display.value = "Error";
        }
    }

    function insertFact() {
        const x = parseFloat(display.value);
        if (Number.isNaN(x) || x < 0) {
            display.value = "Error";
            return;
        }
        let fact = 1;
        for (let i = 1; i <= x; i++) fact *= i;
        display.value = String(fact);
    }
</script>

</body>
</html>
